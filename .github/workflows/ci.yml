name: CI

on:
  push:
    branches: [ main ]
  pull_request:
  # Manual "Run workflow" button in the Actions tab. This is the only way the
  # publish step below ever runs -- a normal push or PR never publishes.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Plugin tests (unit + functional)
        run: ./gradlew -p plugin test --stacktrace

      - name: Smoke-build the sample fat/shaded jar
        run: ./gradlew :sample:fatJar --stacktrace

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: plugin/build/reports/tests/test
          if-no-files-found: ignore

      # Only runs when someone clicks "Run workflow" in the Actions tab -- never
      # on a push or PR. Requires the GRADLE_PUBLISH_KEY / GRADLE_PUBLISH_SECRET
      # repository secrets (Settings -> Secrets and variables -> Actions).
      - name: Publish to Gradle Plugin Portal
        if: github.event_name == 'workflow_dispatch'
        env:
          GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}
        run: ./gradlew -p plugin publishPlugins --no-daemon --stacktrace

  benchmark:
    # Heavy: resolves large deps (netty/lucene/...) and runs many builds.
    # Only on pushes to main, not on every PR.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Run benchmark
        run: GRADLE=./gradlew bash benchmark.sh 3 | tee bench.txt

      - name: Publish benchmark to job summary
        if: always()
        run: |
          {
            echo '## shaded-jar benchmark'
            echo ''
            echo '> CI runners have few, shared cores, so the parallel speedup is'
            echo '> understated and absolute ms are noisy. Read the **ratios**, not the ms.'
            echo ''
            echo '```'
            cat bench.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
